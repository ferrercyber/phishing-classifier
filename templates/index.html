<!DOCTYPE html>
<html>
<head>
    <title>Phishing Classifier</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 60px auto; padding: 20px; }
        textarea { width: 100%; height: 200px; font-size: 14px; padding: 10px; }
        button { margin-top: 10px; padding: 10px 24px; background: #1a1a2e; color: white;
                 border: none; cursor: pointer; font-size: 16px; border-radius: 6px; }
        .result { margin-top: 20px; font-size: 22px; font-weight: bold; }
        .confidence { color: gray; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Phishing Email Classifier</h2>
    <p>Paste an email below to check if it is phishing or safe.</p>
    <form method='POST'>
        <textarea name='email_text' placeholder='Paste email text here...'></textarea>
        <br>
        <button type='submit'>Analyze Email</button>
    </form>
    {% if result %}
        <div class='result'>{{ result }}</div>
        <div class='confidence'>Confidence: {{ confidence }}%</div>
    {% endif %}
</body>
</html>
